services:
  - type: worker
    name: vipstudy-bot
    runtime: python
    repo: https://github.com/YOUR_USERNAME/vipstudy-bot
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: python vipstudy_bot_v6.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PYTHONUNBUFFERED
        value: 1
